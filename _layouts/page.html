---
layout: default
---

<article class="page">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.date %}
    <div class="post-meta">
      <span class="post-date">{{ page.date | date: "%Y-%m-%d" }}</span>
    </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
